server:
  port: 8080
  tomcat:
    max-swallow-size: -1
    max-http-form-post-size: -1

spring:
  servlet:
    multipart:
      max-file-size: 2GB
      max-request-size: 2GB

dfviewer:
  cache-dir: ${DFVIEWER_CACHE_DIR:${user.home}/.dfviewer}
  duckdb-path: ${DFVIEWER_CACHE_DIR:${user.home}/.dfviewer}/cache.duckdb
