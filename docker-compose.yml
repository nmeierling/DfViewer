services:
  backend:
    build: ./backend
    ports:
      - "8080:8080"
    volumes:
      - dfviewer-data:/data
    environment:
      - DFVIEWER_CACHE_DIR=/data
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - AWS_SESSION_TOKEN=${AWS_SESSION_TOKEN:-}
      - AWS_REGION=${AWS_REGION:-eu-central-1}

  frontend:
    build: ./frontend
    ports:
      - "4200:4200"
    depends_on:
      - backend

volumes:
  dfviewer-data:
